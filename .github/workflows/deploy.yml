name: Deploy to chastnik

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY }}

      - name: Build and push backend
        id: build-backend
        run: |
          IMG=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bzik-backend:${{ github.sha }}
          docker build -t $IMG ./bzik_backend
          docker push $IMG
          echo "image=$IMG" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        id: build-frontend
        run: |
          IMG=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bzik-frontend:${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://bzik.158-160-109-247.nip.io/api \
            -t $IMG ./bzik_frontend
          docker push $IMG
          echo "image=$IMG" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          BACKEND_IMAGE: ${{ steps.build-backend.outputs.image }}
          FRONTEND_IMAGE: ${{ steps.build-frontend.outputs.image }}
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash << EOF
          set -e
          mkdir -p ~/bzik

          cat > ~/bzik/docker-compose.prod.yml << 'COMPOSEOF'
          services:
            db:
              image: postgres:16-alpine
              restart: unless-stopped
              env_file: /home/ubuntu/bzik/.env
              volumes:
                - pgdata:/var/lib/postgresql/data

            redis:
              image: redis:7-alpine
              restart: unless-stopped

            backend:
              image: ${BACKEND_IMAGE}
              restart: unless-stopped
              env_file: /home/ubuntu/bzik/.env
              depends_on:
                - db
                - redis
              ports:
                - "127.0.0.1:8086:8000"

            celery:
              image: ${BACKEND_IMAGE}
              restart: unless-stopped
              command: celery -A config worker -l info
              env_file: /home/ubuntu/bzik/.env
              depends_on:
                - db
                - redis

            frontend:
              image: ${FRONTEND_IMAGE}
              restart: unless-stopped
              environment:
                - NEXT_PUBLIC_API_URL=https://bzik.158-160-109-247.nip.io/api
              ports:
                - "127.0.0.1:8085:3000"

          volumes:
            pgdata:
          COMPOSEOF

          echo '${YC_SA_KEY}' | docker login --username json_key --password-stdin cr.yandex

          export BACKEND_IMAGE="${BACKEND_IMAGE}"
          export FRONTEND_IMAGE="${FRONTEND_IMAGE}"

          docker compose -f ~/bzik/docker-compose.prod.yml pull
          docker compose -f ~/bzik/docker-compose.prod.yml up -d
          docker compose -f ~/bzik/docker-compose.prod.yml exec -T backend \
            python manage.py migrate --settings=config.settings.prod
          docker image prune -f
          EOF
