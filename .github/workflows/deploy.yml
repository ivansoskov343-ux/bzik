name: Deploy to chastnik

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY }}

      - name: Build and push backend
        id: build-backend
        run: |
          IMG=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bzik-backend:${{ github.sha }}
          docker build -t $IMG ./bzik_backend
          docker push $IMG
          echo "image=$IMG" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        id: build-frontend
        run: |
          IMG=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bzik-frontend:${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://bzik.158-160-109-247.nip.io/api \
            -t $IMG ./bzik_frontend
          docker push $IMG
          echo "image=$IMG" >> $GITHUB_OUTPUT

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/bzik

            cat > ~/bzik/docker-compose.prod.yml << 'COMPOSEOF'
            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                env_file: /home/ubuntu/bzik/.env
                volumes:
                  - pgdata:/var/lib/postgresql/data

              redis:
                image: redis:7-alpine
                restart: unless-stopped

              backend:
                image: ${{ steps.build-backend.outputs.image }}
                restart: unless-stopped
                env_file: /home/ubuntu/bzik/.env
                depends_on:
                  - db
                  - redis
                ports:
                  - "127.0.0.1:8086:8000"

              celery:
                image: ${{ steps.build-backend.outputs.image }}
                restart: unless-stopped
                command: celery -A config worker -l info
                env_file: /home/ubuntu/bzik/.env
                depends_on:
                  - db
                  - redis

              frontend:
                image: ${{ steps.build-frontend.outputs.image }}
                restart: unless-stopped
                environment:
                  - NEXT_PUBLIC_API_URL=https://bzik.158-160-109-247.nip.io/api
                ports:
                  - "127.0.0.1:8085:3000"

            volumes:
              pgdata:
            COMPOSEOF

            echo '${{ secrets.YC_SA_KEY }}' | docker login \
              --username json_key --password-stdin cr.yandex

            docker compose -f ~/bzik/docker-compose.prod.yml pull
            docker compose -f ~/bzik/docker-compose.prod.yml up -d

            docker compose -f ~/bzik/docker-compose.prod.yml exec -T backend \
              python manage.py migrate --settings=config.settings.prod

            docker image prune -f
