services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8086:8000"

  celery:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://bzik.158-160-109-247.nip.io
    ports:
      - "127.0.0.1:8085:3000"

volumes:
  pgdata:
