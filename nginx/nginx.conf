server {
    # ПОРТ 7860 ОБЯЗАТЕЛЕН! Hugging Face Spaces ожидает, что ваш сервер слушает именно этот порт[reference:2]
    listen 7860;

    # Настройка для статических файлов фронтенда
    location /_next/static {
        alias /app/frontend/.next/static;
        expires 365d;
        access_log off;
    }

    # Прокси для API-запросов к бекенду
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Отдаем интерфейс (для всех остальных запросов)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
